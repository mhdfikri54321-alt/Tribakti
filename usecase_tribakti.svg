<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1550" width="100%" height="100%">
  <!-- Definitions for styling and shadows -->
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
    <linearGradient id="ucGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f0f9ff" />
    </linearGradient>
    <linearGradient id="actorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <style>
      .boundary { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2.5; rx: 12px; }
      .actor-line { stroke: #1e293b; stroke-width: 2.5; stroke-linecap: round; fill: none; }
      .actor-head { fill: url(#actorGrad); stroke: #1e293b; stroke-width: 2.5; }
      .usecase-oval { fill: url(#ucGrad); stroke: #0284c7; stroke-width: 2; filter: url(#shadow); }
      .conn-line { stroke: #64748b; stroke-width: 1.2; fill: none; stroke-dasharray: none; }
      .text-actor { font-family: 'Inter', -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1e293b; text-anchor: middle; }
      .text-usecase { font-family: 'Inter', -apple-system, sans-serif; font-size: 11px; font-weight: 600; fill: #0f172a; text-anchor: middle; }
      .text-system { font-family: 'Inter', -apple-system, sans-serif; font-size: 16px; font-weight: 800; fill: #334155; letter-spacing: 1px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" />

  <!-- System Boundary Box -->
  <rect x="240" y="20" width="580" height="1510" class="boundary" />
  <text x="270" y="52" class="text-system">SYSTEM BOUNDARY - LPK TRIBAKTI</text>

  <!-- CONNECTIONS (All actors on the left connect to ovals in the boundary) -->
  
  <!-- Pengunjung Connections -->
  <line x1="80" y1="130" x2="385" y2="60" class="conn-line" />
  <line x1="80" y1="130" x2="385" y2="130" class="conn-line" />

  <!-- Siswa Connections -->
  <line x1="80" y1="380" x2="385" y2="130" class="conn-line" />
  <line x1="80" y1="380" x2="385" y2="200" class="conn-line" />
  <line x1="80" y1="380" x2="385" y2="270" class="conn-line" />
  <line x1="80" y1="380" x2="385" y2="340" class="conn-line" />
  <line x1="80" y1="380" x2="385" y2="410" class="conn-line" />
  <line x1="80" y1="380" x2="385" y2="480" class="conn-line" />
  <line x1="80" y1="380" x2="385" y2="550" class="conn-line" />
  <line x1="80" y1="380" x2="385" y2="620" class="conn-line" />
  <line x1="80" y1="380" x2="385" y2="1460" class="conn-line" />

  <!-- Instruktur Connections -->
  <line x1="80" y1="680" x2="385" y2="200" class="conn-line" />
  <line x1="80" y1="680" x2="385" y2="410" class="conn-line" />
  <line x1="80" y1="680" x2="385" y2="690" class="conn-line" />
  <line x1="80" y1="680" x2="385" y2="760" class="conn-line" />
  <line x1="80" y1="680" x2="385" y2="830" class="conn-line" />
  <line x1="80" y1="680" x2="385" y2="970" class="conn-line" />
  <line x1="80" y1="680" x2="385" y2="1460" class="conn-line" />

  <!-- Admin Connections -->
  <line x1="80" y1="1030" x2="385" y2="200" class="conn-line" />
  <line x1="80" y1="1030" x2="385" y2="900" class="conn-line" />
  <line x1="80" y1="1030" x2="385" y2="970" class="conn-line" />
  <line x1="80" y1="1030" x2="385" y2="1040" class="conn-line" />
  <line x1="80" y1="1030" x2="385" y2="1110" class="conn-line" />
  <line x1="80" y1="1030" x2="385" y2="1180" class="conn-line" />
  <line x1="80" y1="1030" x2="385" y2="1250" class="conn-line" />
  <line x1="80" y1="1030" x2="385" y2="1320" class="conn-line" />
  <line x1="80" y1="1030" x2="385" y2="1460" class="conn-line" />

  <!-- Owner Connections -->
  <line x1="80" y1="1380" x2="385" y2="200" class="conn-line" />
  <line x1="80" y1="1380" x2="385" y2="1320" class="conn-line" />
  <line x1="80" y1="1380" x2="385" y2="1390" class="conn-line" />
  <line x1="80" y1="1380" x2="385" y2="1460" class="conn-line" />


  <!-- ACTORS (Stick Figures - Arranged on the Left from Top to Bottom) -->
  
  <!-- 1. Pengunjung -->
  <g transform="translate(0, 0)">
    <circle cx="80" cy="100" r="12" class="actor-head" />
    <line x1="80" y1="112" x2="80" y2="145" class="actor-line" />
    <line x1="60" y1="125" x2="100" y2="125" class="actor-line" />
    <line x1="80" y1="145" x2="65" y2="175" class="actor-line" />
    <line x1="80" y1="145" x2="95" y2="175" class="actor-line" />
    <text x="80" y="195" class="text-actor">Pengunjung</text>
  </g>

  <!-- 2. Siswa -->
  <g transform="translate(0, 250)">
    <circle cx="80" cy="100" r="12" class="actor-head" />
    <line x1="80" y1="112" x2="80" y2="145" class="actor-line" />
    <line x1="60" y1="125" x2="100" y2="125" class="actor-line" />
    <line x1="80" y1="145" x2="65" y2="175" class="actor-line" />
    <line x1="80" y1="145" x2="95" y2="175" class="actor-line" />
    <text x="80" y="195" class="text-actor">Siswa</text>
  </g>

  <!-- 3. Instruktur -->
  <g transform="translate(0, 550)">
    <circle cx="80" cy="100" r="12" class="actor-head" />
    <line x1="80" y1="112" x2="80" y2="145" class="actor-line" />
    <line x1="60" y1="125" x2="100" y2="125" class="actor-line" />
    <line x1="80" y1="145" x2="65" y2="175" class="actor-line" />
    <line x1="80" y1="145" x2="95" y2="175" class="actor-line" />
    <text x="80" y="195" class="text-actor">Instruktur</text>
  </g>

  <!-- 4. Admin -->
  <g transform="translate(0, 900)">
    <circle cx="80" cy="100" r="12" class="actor-head" />
    <line x1="80" y1="112" x2="80" y2="145" class="actor-line" />
    <line x1="60" y1="125" x2="100" y2="125" class="actor-line" />
    <line x1="80" y1="145" x2="65" y2="175" class="actor-line" />
    <line x1="80" y1="145" x2="95" y2="175" class="actor-line" />
    <text x="80" y="195" class="text-actor">Admin</text>
  </g>

  <!-- 5. Owner -->
  <g transform="translate(0, 1250)">
    <circle cx="80" cy="100" r="12" class="actor-head" />
    <line x1="80" y1="112" x2="80" y2="145" class="actor-line" />
    <line x1="60" y1="125" x2="100" y2="125" class="actor-line" />
    <line x1="80" y1="145" x2="65" y2="175" class="actor-line" />
    <line x1="80" y1="145" x2="95" y2="175" class="actor-line" />
    <text x="80" y="195" class="text-actor">Owner</text>
  </g>


  <!-- USE CASES (Ordered by Actor from Top to Bottom) -->
  
  <!-- 1. Melihat Informasi LPK -->
  <ellipse cx="530" cy="60" rx="145" ry="22" class="usecase-oval" />
  <text x="530" y="64" class="text-usecase">Melihat Informasi LPK (Paket, FAQ, Artikel)</text>

  <!-- 2. Registrasi -->
  <ellipse cx="530" cy="130" rx="145" ry="22" class="usecase-oval" />
  <text x="530" y="134" class="text-usecase">Registrasi</text>

  <!-- 3. Login -->
  <ellipse cx="530" cy="200" rx="145" ry="22" class="usecase-oval" />
  <text x="530" y="204" class="text-usecase">Login</text>

  <!-- 4. Memilih Paket Kursus -->
  <ellipse cx="530" cy="270" rx="145" ry="22" class="usecase-oval" />
  <text x="530" y="274" class="text-usecase">Memilih Paket Kursus</text>

  <!-- 5. Melihat Jadwal & Memilih Instruktur -->
  <ellipse cx="530" cy="340" rx="145" ry="22" class="usecase-oval" />
  <text x="530" y="344" class="text-usecase">Melihat Jadwal &amp; Memilih Instruktur</text>

  <!-- 6. Melihat Materi Belajar -->
  <ellipse cx="530" cy="410" rx="145" ry="22" class="usecase-oval" />
  <text x="530" y="414" class="text-usecase">Melihat Materi Belajar</text>

  <!-- 7. Mengikuti Simulasi Ujian -->
  <ellipse cx="530" cy="480" rx="145" ry="22" class="usecase-oval" />
  <text x="530" y="484" class="text-usecase">Mengikuti Simulasi Ujian</text>

  <!-- 8. Melihat Hasil & Riwayat Ujian -->
  <ellipse cx="530" cy="550" rx="145" ry="22" class="usecase-oval" />
  <text x="530" y="554" class="text-usecase">Melihat Hasil &amp; Riwayat Ujian</text>

  <!-- 9. Mengunduh E-Sertifikat -->
  <ellipse cx="530" cy="620" rx="145" ry="22" class="usecase-oval" />
  <text x="530" y="624" class="text-usecase">Mengunduh E-Sertifikat</text>

  <!-- 10. Melihat Data Sesi Latihan -->
  <ellipse cx="530" cy="690" rx="145" ry="22" class="usecase-oval" />
  <text x="530" y="694" class="text-usecase">Melihat Data Sesi Latihan</text>

  <!-- 11. Melakukan Evaluasi -->
  <ellipse cx="530" cy="760" rx="145" ry="22" class="usecase-oval" />
  <text x="530" y="764" class="text-usecase">Melakukan Evaluasi (Input Nilai &amp; Catatan)</text>

  <!-- 12. Mengelola Materi Belajar -->
  <ellipse cx="530" cy="830" rx="145" ry="22" class="usecase-oval" />
  <text x="530" y="834" class="text-usecase">Mengelola Materi Belajar</text>

  <!-- 13. Mengelola Bank Soal -->
  <ellipse cx="530" cy="900" rx="145" ry="22" class="usecase-oval" />
  <text x="530" y="904" class="text-usecase">Mengelola Bank Soal</text>

  <!-- 14. Mencari Data Siswa -->
  <ellipse cx="530" cy="970" rx="145" ry="22" class="usecase-oval" />
  <text x="530" y="974" class="text-usecase">Mencari Data Siswa</text>

  <!-- 15. Verifikasi Pembayaran Siswa -->
  <ellipse cx="530" cy="1040" rx="145" ry="22" class="usecase-oval" />
  <text x="530" y="1044" class="text-usecase">Verifikasi Pembayaran Siswa</text>

  <!-- 16. Manajemen Data Instruktur -->
  <ellipse cx="530" cy="1110" rx="145" ry="22" class="usecase-oval" />
  <text x="530" y="1114" class="text-usecase">Manajemen Data Instruktur (CRUD)</text>

  <!-- 17. Manajemen Kurikulum -->
  <ellipse cx="530" cy="1180" rx="145" ry="22" class="usecase-oval" />
  <text x="530" y="1184" class="text-usecase">Manajemen Kurikulum</text>

  <!-- 18. Manajemen Master Data -->
  <ellipse cx="530" cy="1250" rx="145" ry="22" class="usecase-oval" />
  <text x="530" y="1254" class="text-usecase">Manajemen Master Data (Akun, Konten, dll)</text>

  <!-- 19. Memantau Dashboard -->
  <ellipse cx="530" cy="1320" rx="145" ry="22" class="usecase-oval" />
  <text x="530" y="1324" class="text-usecase">Memantau Dashboard (Laporan &amp; Tren)</text>

  <!-- 20. Mengelola Pengeluaran Operasional -->
  <ellipse cx="530" cy="1390" rx="145" ry="22" class="usecase-oval" />
  <text x="530" y="1394" class="text-usecase">Mengelola Pengeluaran Operasional</text>

  <!-- 21. Logout -->
  <ellipse cx="530" cy="1460" rx="145" ry="22" class="usecase-oval" />
  <text x="530" y="1464" class="text-usecase">Logout</text>
</svg>
