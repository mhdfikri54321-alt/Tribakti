<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 650" width="100%" height="100%">
  <!-- Definitions for styles and drop shadows -->
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
    <style>
      .entity { fill: #0b6e99; stroke: #085374; stroke-width: 2; filter: url(#shadow); rx: 6px; }
      .relationship { fill: #37352f; stroke: #23221f; stroke-width: 2; filter: url(#shadow); }
      .attribute { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; filter: url(#shadow); }
      .key-attr { font-weight: bold; text-decoration: underline; }
      .text-label { font-family: 'Inter', -apple-system, sans-serif; font-size: 12px; fill: #1e293b; text-anchor: middle; }
      .text-entity { font-family: 'Inter', -apple-system, sans-serif; font-size: 13px; font-weight: bold; fill: #ffffff; text-anchor: middle; }
      .text-relation { font-family: 'Inter', -apple-system, sans-serif; font-size: 12px; font-weight: 500; fill: #ffffff; text-anchor: middle; }
      .line-conn { stroke: #64748b; stroke-width: 1.5; stroke-dasharray: none; }
      .cardinality { font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #ef4444; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" />

  <!-- CONNECTIONS (drawn behind shapes) -->
  <!-- Penyumbang Attributes -->
  <line x1="200" y1="225" x2="200" y2="105" class="line-conn" />
  <line x1="200" y1="225" x2="100" y2="125" class="line-conn" />
  <line x1="200" y1="225" x2="70" y2="175" class="line-conn" />
  <line x1="200" y1="225" x2="70" y2="235" class="line-conn" />
  <line x1="200" y1="225" x2="100" y2="285" class="line-conn" />
  <line x1="200" y1="225" x2="200" y2="335" class="line-conn" />

  <!-- Petugas Attributes -->
  <line x1="260" y1="475" x2="200" y2="555" class="line-conn" />
  <line x1="260" y1="475" x2="320" y2="555" class="line-conn" />

  <!-- Sumbangan Attributes -->
  <line x1="660" y1="225" x2="560" y2="125" class="line-conn" />
  <line x1="660" y1="225" x2="660" y2="105" class="line-conn" />
  <line x1="660" y1="225" x2="760" y2="135" class="line-conn" />

  <!-- Item Attributes -->
  <line x1="660" y1="475" x2="600" y2="555" class="line-conn" />
  <line x1="660" y1="475" x2="720" y2="555" class="line-conn" />
  <line x1="660" y1="475" x2="800" y2="505" class="line-conn" />
  <line x1="660" y1="475" x2="800" y2="435" class="line-conn" />

  <!-- Entity-Relationship Lines -->
  <!-- Penyumbang to Memberikan to Sumbangan -->
  <line x1="260" y1="225" x2="380" y2="225" class="line-conn" />
  <line x1="480" y1="225" x2="600" y2="225" class="line-conn" />

  <!-- Sumbangan to Diterima to Petugas -->
  <line x1="600" y1="240" x2="430" y2="350" class="line-conn" />
  <line x1="430" y1="350" x2="260" y2="455" class="line-conn" />

  <!-- Sumbangan to Berisi to Item -->
  <line x1="660" y1="250" x2="660" y2="320" class="line-conn" />
  <line x1="660" y1="380" x2="660" y2="450" class="line-conn" />


  <!-- ATTRIBUTES (Ovals) -->
  <!-- Penyumbang Attributes -->
  <ellipse cx="200" cy="105" rx="55" ry="20" class="attribute" />
  <text x="200" y="109" class="text-label key-attr">Id Penyumbang</text>

  <ellipse cx="100" cy="125" rx="45" ry="20" class="attribute" />
  <text x="100" y="129" class="text-label">nama</text>

  <ellipse cx="70" cy="175" rx="40" ry="20" class="attribute" />
  <text x="70" y="179" class="text-label">kota</text>

  <ellipse cx="70" cy="235" rx="40" ry="20" class="attribute" />
  <text x="70" y="239" class="text-label">alamat</text>

  <ellipse cx="100" cy="285" rx="40" ry="20" class="attribute" />
  <text x="100" y="289" class="text-label">hp</text>

  <ellipse cx="200" cy="335" rx="45" ry="20" class="attribute" />
  <text x="200" y="339" class="text-label">Telpon</text>

  <!-- Petugas Attributes -->
  <ellipse cx="200" cy="555" rx="55" ry="20" class="attribute" />
  <text x="200" y="559" class="text-label key-attr">Id Petugas</text>

  <ellipse cx="320" cy="555" rx="55" ry="20" class="attribute" />
  <text x="320" y="559" class="text-label">Nama petugas</text>

  <!-- Sumbangan Attributes -->
  <ellipse cx="560" cy="125" rx="45" ry="20" class="attribute" />
  <text x="560" y="129" class="text-label key-attr">No Bukti</text>

  <ellipse cx="660" cy="105" rx="45" ry="20" class="attribute" />
  <text x="660" y="109" class="text-label">Tanggal</text>

  <ellipse cx="760" cy="135" rx="55" ry="20" class="attribute" />
  <text x="760" y="139" class="text-label">Menyerahkan</text>

  <!-- Item Attributes -->
  <ellipse cx="600" cy="555" rx="45" ry="20" class="attribute" />
  <text x="600" y="559" class="text-label key-attr">No Urut</text>

  <ellipse cx="720" cy="555" rx="55" ry="20" class="attribute" />
  <text x="720" y="559" class="text-label">Nama item</text>

  <ellipse cx="800" cy="505" rx="45" ry="20" class="attribute" />
  <text x="800" y="509" class="text-label">Jumlah</text>

  <ellipse cx="800" cy="435" rx="40" ry="20" class="attribute" />
  <text x="800" y="439" class="text-label">Satuan</text>


  <!-- RELATIONSHIPS (Diamonds) -->
  <!-- Memberikan -->
  <polygon points="430,200 480,225 430,250 380,225" class="relationship" />
  <text x="430" y="229" class="text-relation">Memberikan</text>

  <!-- Diterima -->
  <polygon points="430,325 480,350 430,375 380,350" class="relationship" />
  <text x="430" y="354" class="text-relation">Diterima</text>

  <!-- Berisi -->
  <polygon points="660,320 700,350 660,380 620,350" class="relationship" />
  <text x="660" y="354" class="text-relation">Berisi</text>


  <!-- ENTITIES (Rectangles) -->
  <!-- Penyumbang -->
  <rect x="140" y="200" width="120" height="50" class="entity" />
  <text x="200" y="230" class="text-entity">Penyumbang</text>

  <!-- Petugas -->
  <rect x="200" y="450" width="120" height="50" class="entity" />
  <text x="260" y="480" class="text-entity">Petugas</text>

  <!-- Sumbangan -->
  <rect x="600" y="200" width="120" height="50" class="entity" />
  <text x="660" y="230" class="text-entity">Sumbangan</text>

  <!-- Item -->
  <rect x="600" y="450" width="120" height="50" class="entity" />
  <text x="660" y="480" class="text-entity">Item</text>


  <!-- CARDINALITY LABELS -->
  <text x="270" y="218" class="cardinality">1</text>
  <text x="585" y="218" class="cardinality">M</text>
  
  <text x="250" y="440" class="cardinality">1</text>
  <text x="590" y="260" class="cardinality">M</text>
  
  <text x="670" y="265" class="cardinality">1</text>
  <text x="670" y="440" class="cardinality">M</text>
</svg>
